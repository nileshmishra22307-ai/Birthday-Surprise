<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Little Secret For You 💕</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- ambient floating background, sits behind everything -->
<div class="ambient" id="ambient"></div>

<!-- ======================= PASSWORD LOCK SCREEN ======================= -->
<section id="lockScreen" class="lock-screen">
  <div class="lock-box">
    <div class="lock-icon" id="lockIcon">🔒</div>
    <h1 class="lock-title" id="lockTitle"></h1>
    <p class="lock-sub" id="lockSub"></p>
    <form id="passForm" class="pass-form" autocomplete="off">
      <input type="password" id="passInput" placeholder="Enter password" required>
      <button type="submit">Unlock <span class="btn-spark">✨</span></button>
    </form>
    <p id="hint" class="hint"></p>
  </div>
</section>

<!-- ======================= APP (3 sequential pages) ======================= -->
<div id="app" class="hidden">

  <div class="dots" id="dots">
    <span class="dot active" data-i="0"></span>
    <span class="dot" data-i="1"></span>
    <span class="dot" data-i="2"></span>
  </div>

  <!-- PAGE 1: Balloons -->
  <section class="page active" id="page-balloons">
    <div class="page-inner center-inner">
      <p class="eyebrow">tap each one</p>
      <h2 class="page-title">Pop the balloons 🎈</h2>
      <div class="balloon-row" id="balloonRow"></div>
      <p class="hint-text">go on, pop them all...</p>
      <button class="next-btn" id="toGalleryBtn" onclick="showPage(1)">Next <span class="arrow">→</span></button>
    </div>
  </section>

  <!-- PAGE 2: Gallery -->
  <section class="page" id="page-gallery">
    <div class="page-inner scroll-inner">
      <button class="back-link" onclick="showPage(0)">← Back</button>
      <p class="eyebrow">our story so far</p>
      <h2 class="page-title" id="galleryTitle"></h2>
      <div class="gallery-list" id="galleryList"></div>
      <button class="next-btn shown" onclick="showPage(2)">Next <span class="arrow">→</span></button>
    </div>
  </section>

  <!-- PAGE 3: Message -->
  <section class="page" id="page-message">
    <div class="page-inner scroll-inner">
      <button class="back-link" onclick="showPage(1)">← Back</button>
      <div class="message-card">
        <p class="eyebrow">last but not least</p>
        <h2 class="message-title" id="messageTitle"></h2>
        <div class="message-content" id="messageContent"></div>
        <p class="message-signature" id="messageSignature"></p>
        <button class="celebrate-btn" id="celebrateBtn" onclick="celebrate()">Celebrate 🎉</button>
      </div>
    </div>
  </section>

</div>

<div class="confetti-layer" id="confettiLayer"></div>

<script>
/* =====================================================================
   ✏️✏️✏️  SIRF YAHI CONFIG SECTION EDIT KARO — neeche kuch mat chhedo  ✏️✏️✏️
   ===================================================================== */
const CONFIG = {
  PASSWORD: "21/07/2003",              // <-- unlock password yaha set karo

  PARTNER_NAME: "Kush",             // <-- unka naam / nickname
  LOCK_TITLE: "Kush Something special is waiting for you",
  LOCK_SUBTITLE: "Enter the password to unlock it",

  // Balloon pop hone par yahi text dikhega. Exactly 4 lines rakhna (4 balloons hain).
  BALLOON_MESSAGES: [
    "You are so awesome",
    "You make everything better",
    "My favourite person, always",
    "You are pure magic"
  ],

  GALLERY_TITLE: "Our Beautiful Memories",

  // Har photo ke liye ek line. src me photo ka link (Imgur direct link best hai), caption me chhota sa caption.
  PHOTOS: [
    { src: "photo1.jpg", caption: "Every moment with you is magical" },
    { src: "photo2.jpg", caption: "Your smile lights up my world" },
    { src: "photo3.jpg", caption: "Adventures together" },
    { src: "photo4.jpg", caption: "My heart belongs to you" },
    { src: "photo5.jpg", caption: "Creating memories together" },
    { src: "photo6.jpg", caption: "Forever and always" }
  ],

  MESSAGE_TITLE: "A Little Something, Just For You",
  // Har paragraph ek naya <p> banega. Jitne chaho utne paragraph rakh sakte ho.
  MESSAGE_PARAGRAPHS: [
    "Happy Birthday to the boy who started as my childhood friend and became the greatest love of my life.",
    "Six years with you have taught me that love isn’t about perfect moments—it’s about choosing each other through every smile, every tear, every fight, and every hug.
    "Thank you for being my safe place, my biggest blessing, and the person who makes every ordinary day feel special."
    "No matter where life takes us, my heart will always find its way back to you."
  ],
  MESSAGE_SIGNATURE: "I love you endlessly. Happy Birthday, my forever. ♾️🤍"
};

/* =====================================================================
   Neeche se kuch bhi mat badlo — yeh sirf website chalane ke liye hai
   ===================================================================== */

const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

document.getElementById('lockTitle').textContent = CONFIG.LOCK_TITLE;
document.getElementById('lockSub').textContent = CONFIG.LOCK_SUBTITLE;
document.getElementById('galleryTitle').textContent = CONFIG.GALLERY_TITLE;
document.getElementById('messageTitle').textContent = CONFIG.MESSAGE_TITLE;
document.getElementById('messageSignature').textContent = CONFIG.MESSAGE_SIGNATURE;

/* ---- Build balloons ---- */
const balloonColors = ['#ff6f91', '#d4af6a', '#c98a9c', '#e8607a'];
const balloonRow = document.getElementById('balloonRow');
let poppedCount = 0;

CONFIG.BALLOON_MESSAGES.slice(0, 4).forEach((msg, i) => {
  const wrap = document.createElement('div');
  wrap.className = 'balloon-wrap';
  wrap.style.setProperty('--balloon-color', balloonColors[i % balloonColors.length]);
  wrap.style.setProperty('--i', i);
  wrap.innerHTML = `
    <div class="msg-bubble" id="bubble-${i}"><span>${msg}</span></div>
    <div class="balloon" data-i="${i}">
      <div class="balloon-shine"></div>
    </div>
    <div class="balloon-string"></div>`;
  balloonRow.appendChild(wrap);
  wrap.querySelector('.balloon').addEventListener('click', function () { popBalloon(i, this); });
});

function popBalloon(i, el) {
  const wrap = el.closest('.balloon-wrap');
  if (wrap.classList.contains('popped')) return;
  wrap.classList.add('popped');
  const rect = el.getBoundingClientRect();
  const color = getComputedStyle(wrap).getPropertyValue('--balloon-color').trim();
  spawnConfetti(rect.left + rect.width / 2, rect.top + rect.height / 2, color, 20);
  setTimeout(() => { document.getElementById('bubble-' + i).classList.add('show'); }, 330);
  poppedCount++;
  if (poppedCount >= 4) {
    document.querySelector('.hint-text').textContent = "all popped — you're so awesome yourself for reading these 💕";
    setTimeout(() => { document.getElementById('toGalleryBtn').classList.add('shown'); }, 700);
  }
}

/* ---- Build gallery ---- */
const galleryList = document.getElementById('galleryList');
CONFIG.PHOTOS.forEach((p, i) => {
  const card = document.createElement('div');
  card.className = 'photo-card';
  card.style.setProperty('--i', i % 2);
  card.innerHTML = `
    <div class="photo-frame">
      <img src="${p.src}" alt="${p.caption}" onerror="this.parentElement.classList.add('placeholder'); this.style.display='none';">
      <div class="ph-fallback">📷<br><small>add ${p.src}</small></div>
    </div>
    <p class="photo-caption">${p.caption}</p>`;
  galleryList.appendChild(card);
});

/* ---- Build message ---- */
const msgContent = document.getElementById('messageContent');
CONFIG.MESSAGE_PARAGRAPHS.forEach(txt => {
  const p = document.createElement('p');
  p.className = 'message-text';
  p.textContent = txt;
  msgContent.appendChild(p);
});

/* ---- Password lock ---- */
const passForm = document.getElementById('passForm');
const lockIcon = document.getElementById('lockIcon');
const hint = document.getElementById('hint');
let attempts = 0;

passForm.addEventListener('submit', e => {
  e.preventDefault();
  const val = document.getElementById('passInput').value;
  if (val === CONFIG.PASSWORD) {
    unlockSite();
  } else {
    attempts++;
    lockIcon.classList.remove('shake');
    void lockIcon.offsetWidth;
    lockIcon.classList.add('shake');
    hint.textContent = attempts >= 3 ? "Hint: it's something only you two would know 💭" : "Oops, wrong password. Try again 💕";
  }
});

function unlockSite() {
  document.getElementById('lockScreen').classList.add('fade-out');
  setTimeout(() => {
    document.getElementById('lockScreen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('app').classList.add('shown');
  }, 550);
}

/* ---- Page navigation ---- */
const pageIds = ['page-balloons', 'page-gallery', 'page-message'];
function showPage(idx) {
  pageIds.forEach((id, i) => {
    const el = document.getElementById(id);
    el.classList.remove('active', 'prev');
    if (i === idx) el.classList.add('active');
    else if (i < idx) el.classList.add('prev');
  });
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx));
  document.getElementById(pageIds[idx]).querySelector('.page-inner').scrollTop = 0;
  if (idx === 1) setTimeout(revealGallery, 250);
  if (idx === 2) setTimeout(revealMessage, 250);
}

function revealGallery() {
  document.querySelectorAll('.photo-card').forEach((el, i) => {
    setTimeout(() => el.classList.add('visible'), i * 130);
  });
}
function revealMessage() {
  document.querySelectorAll('.message-text').forEach((el, i) => {
    setTimeout(() => el.classList.add('visible'), i * 220);
  });
  setTimeout(() => document.getElementById('celebrateBtn').classList.add('shown'),
    (document.querySelectorAll('.message-text').length + 1) * 220);
}

/* ---- Confetti ---- */
function spawnConfetti(x, y, color, count) {
  if (reduceMotion) return;
  const layer = document.getElementById('confettiLayer');
  for (let k = 0; k < count; k++) {
    const p = document.createElement('span');
    p.className = 'confetti-bit';
    const angle = Math.random() * Math.PI * 2;
    const dist = 50 + Math.random() * 100;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist - 30;
    p.style.left = x + 'px';
    p.style.top = y + 'px';
    p.style.background = Math.random() > 0.45 ? color : '#ffe9d6';
    p.style.setProperty('--dx', dx + 'px');
    p.style.setProperty('--dy', dy + 'px');
    p.style.setProperty('--rot', (Math.random() * 720 - 360) + 'deg');
    layer.appendChild(p);
    setTimeout(() => p.remove(), 1200);
  }
}

function celebrate() {
  const w = window.innerWidth;
  for (let i = 0; i < 6; i++) {
    setTimeout(() => {
      spawnConfetti(Math.random() * w, window.innerHeight * 0.3, balloonColors[i % balloonColors.length], 26);
    }, i * 120);
  }
}

/* ---- Ambient floating hearts (behind everything, always running) ---- */
(function () {
  if (reduceMotion) return;
  const container = document.getElementById('ambient');
  const symbols = ['❤️', '💛', '✨', '💫'];
  for (let i = 0; i < 22; i++) {
    const s = document.createElement('span');
    s.className = 'amb-bit';
    s.textContent = symbols[Math.floor(Math.random() * symbols.length)];
    s.style.left = Math.random() * 100 + 'vw';
    s.style.animationDuration = (10 + Math.random() * 12) + 's';
    s.style.animationDelay = (Math.random() * 12) + 's';
    s.style.fontSize = (10 + Math.random() * 12) + 'px';
    container.appendChild(s);
  }
})();
</script>

<style>
  :root {
    --wine: #3B0F2E;
    --wine-deep: #170710;
    --rosegold: #C98A9C;
    --blush: #F9E6E0;
    --gold: #C9A15A;
    --pink: #ff6b9d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Poppins', sans-serif;
    background: var(--wine-deep);
    color: var(--blush);
    overflow: hidden;
  }
  .hidden { display: none !important; }
  button { font-family: inherit; }
  button:focus-visible, input:focus-visible { outline: 2px solid var(--gold); outline-offset: 3px; }

  /* ---------- Ambient background ---------- */
  .ambient { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
  .amb-bit { position: absolute; top: 105vh; opacity: 0; animation: drift linear infinite; }
  @keyframes drift {
    0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
    10% { opacity: 0.55; }
    90% { opacity: 0.4; }
    100% { transform: translateY(-115vh) translateX(20px) rotate(180deg); opacity: 0; }
  }

  /* ---------- Lock screen ---------- */
  .lock-screen {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at top, var(--wine) 0%, var(--wine-deep) 75%);
    transition: opacity 0.55s ease;
  }
  .lock-screen.fade-out { opacity: 0; }
  .lock-box { position: relative; z-index: 2; text-align: center; padding: 20px; max-width: 420px; }
  .lock-icon { font-size: 3rem; margin-bottom: 18px; }
  .lock-icon.shake { animation: shake 0.4s; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px) rotate(-4deg); }
    40% { transform: translateX(8px) rotate(4deg); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }
  .lock-title { font-family: 'Playfair Display', serif; font-size: clamp(1.4rem, 4vw, 2rem); color: var(--gold); margin-bottom: 8px; }
  .lock-sub { color: var(--rosegold); font-size: 1rem; margin-bottom: 24px; }
  .pass-form { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .pass-form input {
    padding: 12px 18px; border-radius: 30px; border: 1px solid var(--rosegold);
    background: rgba(255,255,255,0.06); color: var(--blush); font-size: 1rem; outline: none;
  }
  .pass-form button {
    padding: 12px 26px; border-radius: 30px; border: none;
    background: linear-gradient(120deg, var(--gold), var(--rosegold));
    color: var(--wine-deep); font-weight: 600; cursor: pointer; transition: transform 0.2s ease;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .pass-form button:hover { transform: translateY(-2px) scale(1.03); }
  .btn-spark { display: inline-block; animation: twinkle 1.4s ease-in-out infinite; }
  @keyframes twinkle { 0%,100% { transform: scale(1); } 50% { transform: scale(1.3) rotate(15deg); } }
  .hint { margin-top: 14px; color: var(--rosegold); font-size: 0.85rem; min-height: 18px; }

  /* ---------- App shell ---------- */
  #app { position: fixed; inset: 0; z-index: 10; opacity: 0; }
  #app.shown { opacity: 1; transition: opacity 0.5s ease; }

  .dots { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); z-index: 30; display: flex; gap: 10px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(249,230,224,0.25); transition: all 0.3s ease; }
  .dot.active { background: var(--gold); width: 22px; border-radius: 5px; }

  .page {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at bottom, var(--wine) 0%, var(--wine-deep) 82%);
    opacity: 0; transform: translateX(50px) scale(0.97); pointer-events: none;
    transition: opacity 0.65s cubic-bezier(.16,1,.3,1), transform 0.65s cubic-bezier(.16,1,.3,1);
  }
  .page.active { opacity: 1; transform: translateX(0) scale(1); pointer-events: auto; z-index: 2; }
  .page.prev { opacity: 0; transform: translateX(-50px) scale(0.97); }
  .page-inner { width: 100%; max-width: 900px; padding: 60px 24px 90px; }
  .center-inner { text-align: center; }
  .scroll-inner { height: 100vh; overflow-y: auto; }

  .back-link {
    background: none; border: none; color: var(--rosegold); font-size: 0.9rem; cursor: pointer;
    margin-bottom: 20px; padding: 6px 0; transition: color 0.2s ease;
  }
  .back-link:hover { color: var(--gold); }

  .eyebrow {
    font-size: 0.78rem; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--rosegold); margin-bottom: 10px; text-align: center;
  }
  .page-title {
    font-family: 'Playfair Display', serif; font-size: clamp(1.7rem, 5vw, 2.5rem);
    color: var(--gold); text-align: center; margin-bottom: 40px;
  }

  /* ---------- Balloon page ---------- */
  .balloon-row { display: flex; justify-content: center; gap: 34px; flex-wrap: wrap; margin: 20px 0 30px; }
  .balloon-wrap { position: relative; width: 130px; display: flex; flex-direction: column; align-items: center; animation: bob 3.4s ease-in-out infinite; animation-delay: calc(var(--i) * 0.35s); }
  @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-14px); } }

  .balloon {
    width: 78px; height: 96px; border-radius: 50% 50% 50% 50% / 58% 58% 42% 42%;
    background: linear-gradient(150deg, var(--balloon-color), rgba(0,0,0,0.25));
    position: relative; cursor: pointer; box-shadow: inset -8px -10px 20px rgba(0,0,0,0.25), 0 8px 18px rgba(0,0,0,0.35);
    transition: transform 0.15s ease; transform-origin: center bottom;
  }
  .balloon:hover { transform: scale(1.06) rotate(-2deg); }
  .balloon-shine { position: absolute; top: 16px; left: 16px; width: 16px; height: 22px; border-radius: 50%; background: rgba(255,255,255,0.45); transform: rotate(-20deg); }
  .balloon-string { width: 1px; height: 34px; background: rgba(249,230,224,0.4); margin-top: 2px; }
  .balloon-wrap.popped .balloon { animation: popScale 0.3s ease forwards; pointer-events: none; }
  .balloon-wrap.popped .balloon-string { opacity: 0; transition: opacity 0.2s ease; }
  @keyframes popScale {
    0% { transform: scale(1); opacity: 1; }
    55% { transform: scale(1.15); opacity: 1; }
    100% { transform: scale(0); opacity: 0; }
  }
  .msg-bubble {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    opacity: 0; transform: scale(0.85);
    transition: all 0.4s cubic-bezier(.34,1.56,.64,1); pointer-events: none;
  }
  .msg-bubble.show { opacity: 1; transform: scale(1); }
  .msg-bubble span {
    display: block; background: rgba(255,255,255,0.08); border: 1px solid var(--rosegold);
    border-radius: 14px; padding: 8px 10px; font-size: 0.76rem; color: var(--blush); font-weight: 500;
    text-align: center; line-height: 1.3;
  }
  .hint-text { color: var(--rosegold); font-size: 0.9rem; margin-bottom: 30px; min-height: 20px; }

  .next-btn {
    padding: 13px 30px; border-radius: 30px; border: none; font-size: 0.95rem; font-weight: 600;
    background: linear-gradient(120deg, var(--gold), var(--pink)); color: var(--wine-deep);
    cursor: pointer; opacity: 0; transform: translateY(10px); pointer-events: none;
    transition: all 0.4s ease; display: inline-flex; align-items: center; gap: 8px; margin: 10px auto 0;
  }
  .next-btn.shown { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .next-btn:hover { transform: translateY(-3px) scale(1.03); }
  .arrow { transition: transform 0.2s ease; }
  .next-btn:hover .arrow { transform: translateX(4px); }

  /* ---------- Gallery page ---------- */
  .gallery-list { display: flex; flex-direction: column; gap: 26px; max-width: 480px; margin: 0 auto 40px; }
  .photo-card { opacity: 0; transform: translateX(calc(var(--i) * 40px - 20px)) scale(0.94); transition: all 0.6s cubic-bezier(.16,1,.3,1); }
  .photo-card.visible { opacity: 1; transform: translateX(0) scale(1); }
  .photo-frame {
    position: relative; aspect-ratio: 4/3; border-radius: 18px; overflow: hidden;
    border: 2px solid var(--rosegold); background: rgba(255,255,255,0.05);
  }
  .photo-frame img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
  .photo-frame:hover img { transform: scale(1.08) rotate(0.5deg); }
  .ph-fallback { display: none; position: absolute; inset: 0; align-items: center; justify-content: center; flex-direction: column; font-size: 1.6rem; color: var(--rosegold); text-align: center; padding: 8px; }
  .photo-frame.placeholder .ph-fallback { display: flex; }
  .photo-caption { font-family: 'Dancing Script', cursive; font-size: 1.3rem; color: var(--gold); text-align: center; margin-top: 12px; }

  /* ---------- Message page ---------- */
  .message-card { max-width: 640px; margin: 0 auto; text-align: center; }
  .message-title { font-family: 'Playfair Display', serif; font-size: clamp(1.6rem, 4vw, 2.2rem); color: var(--gold); margin-bottom: 30px; }
  .message-text { font-size: 1.1rem; line-height: 1.85; color: var(--blush); margin-bottom: 18px; opacity: 0; transform: translateY(15px); transition: all 0.7s ease; }
  .message-text.visible { opacity: 1; transform: translateY(0); }
  .message-signature { font-family: 'Dancing Script', cursive; font-size: 1.4rem; color: var(--gold); margin: 18px 0 34px; }
  .celebrate-btn {
    padding: 14px 34px; border-radius: 30px; border: none; font-size: 1rem; font-weight: 600;
    background: linear-gradient(120deg, var(--pink), var(--gold)); color: var(--wine-deep);
    cursor: pointer; opacity: 0; transform: translateY(10px) scale(0.9); pointer-events: none;
    transition: all 0.4s ease;
  }
  .celebrate-btn.shown { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
  .celebrate-btn:hover { transform: translateY(-3px) scale(1.04); }

  /* ---------- Confetti ---------- */
  .confetti-layer { position: fixed; inset: 0; z-index: 200; pointer-events: none; overflow: hidden; }
  .confetti-bit {
    position: absolute; width: 7px; height: 7px; border-radius: 2px;
    animation: confettiPop 1.1s cubic-bezier(.16,1,.3,1) forwards;
  }
  @keyframes confettiPop {
    0% { transform: translate(0,0) rotate(0deg); opacity: 1; }
    100% { transform: translate(var(--dx), calc(var(--dy) + 160px)) rotate(var(--rot)); opacity: 0; }
  }

  @media (prefers-reduced-motion: reduce) {
    .balloon-wrap, .amb-bit, .btn-spark { animation: none !important; }
  }

  @media (max-width: 480px) {
    .balloon-row { gap: 16px; }
    .balloon-wrap { width: 100px; }
    .balloon { width: 64px; height: 80px; }
  }
</style>
</body>
</html>
